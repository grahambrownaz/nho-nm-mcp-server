name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Railway (Staging)
        uses: railwayapp/railway-github-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: nho-nm-platform-staging

      - name: Wait for deployment
        run: sleep 30

      - name: Verify deployment
        run: |
          curl -f ${{ vars.STAGING_URL }}/health || exit 1

      - name: Notify success
        if: success()
        run: |
          echo "Staging deployment successful!"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment: production
    needs: [deploy-staging]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Railway (Production)
        uses: railwayapp/railway-github-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: nho-nm-platform-production

      - name: Wait for deployment
        run: sleep 30

      - name: Verify deployment
        run: |
          curl -f ${{ vars.PRODUCTION_URL }}/health || exit 1

      - name: Notify success
        if: success()
        run: |
          echo "Production deployment successful!"
          # Add Slack/Discord notification here if needed

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment verification failed. Consider rollback."
          # Add rollback logic or notification here
